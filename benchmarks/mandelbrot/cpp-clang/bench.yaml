algo: mandelbrot
language: cpp
compiler: clang
# Nothing executes the binary but the CPU.
interpreter: ~
# The kernel. One file, and its size in bytes is a published metric.
source: mandelbrot.cpp
# clang distinguishes all three, and spells them exactly as gcc does.
modes: all
description: >-
  The same mandelbrot.cpp as cpp-gcc, byte for byte, compiled by clang++ at -O3
  against the same ISA baseline and -- this is the part that matters -- the same
  libstdc++. One source, one standard library, two code generators.
comments: >-
  Debian's clang++ links libstdc++, not libc++, and that is deliberate: an STL
  swap would be a second variable, and this row is here to isolate the first.
  Read it against cpp-gcc, and read c-clang against c-gcc for the same reason.
