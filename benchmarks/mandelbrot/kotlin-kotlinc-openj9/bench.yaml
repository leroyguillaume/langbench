language: kotlin
compiler: kotlinc
interpreter: openj9
# The kernel. One file, and its size in bytes is a published metric.
source: Mandelbrot.kt
modes:
  - strict
description: >-
  The same Mandelbrot.kt as kotlin-kotlinc-openjdk, byte for byte, compiled by the
  same kotlinc and executed by Eclipse OpenJ9 instead of HotSpot.
comments: >-
  Like every OpenJ9 row, it has NO ISA baseline: OpenJ9 silently ignores unknown
  -XX: options, so the HotSpot vector caps would have pinned nothing while claiming
  to. The gap is published rather than papered over.
