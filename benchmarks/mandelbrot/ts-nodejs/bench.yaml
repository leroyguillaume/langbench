language: ts
# Nothing is compiled ahead of the run, and this is the subtle one: Node does not
# *compile* TypeScript, it erases it. The types are stripped syntactically and the
# JavaScript underneath is handed to V8 -- no tsc, no emit, no type check. There
# is no compiler in this pipeline, only a runtime that ignores the annotations.
compiler: ~
interpreter: nodejs
# The kernel. One file, and its size in bytes is a published metric.
source: mandelbrot.mts
# `native`, and nothing else to offer. The types are gone before V8 ever sees the
# program, and what V8 then runs is machine code its JIT generates *during* the
# run, on this machine, for the instruction set this CPU turned out to have. There
# is no ISA to pin ahead of time, and no flag that would pin one.
modes:
  - native
description: >-
  The kernel in TypeScript, executed by Node 24, which strips the types and runs
  the JavaScript underneath. Same worker_threads, same SharedArrayBuffer row queue,
  same arithmetic as js-nodejs -- the annotations are the only difference.
comments: >-
  Node erases the types syntactically and hands the JavaScript to V8 — no tsc, no
  emit, no type check. Every worker isolate loads the file and erases them again. The
  source is js-nodejs's, with annotations and nothing else added.
