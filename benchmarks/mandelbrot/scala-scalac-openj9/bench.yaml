language: scala
compiler: scalac
interpreter: openj9
# The kernel. One file, and its size in bytes is a published metric.
source: Mandelbrot.scala
# One mode, and it is not a choice this backend made. Testarossa compiles the hot
# loop while the program runs, on the machine it is running on, and takes that
# machine's instruction set as it finds it. A JIT has no `baseline` to give --
# `native` is what a JIT *is*.
modes:
  - native
description: >-
  The same Mandelbrot.scala as scala-scalac-openjdk, byte for byte, compiled by the
  same scalac and executed by Eclipse OpenJ9 instead of HotSpot.
comments: >-
  A different virtual machine, not a different build of HotSpot: OpenJ9 brings its own
  JIT (Testarossa), its own GC and its own object layout, under bytecode that is byte for
  byte the other Scala rows'. Floating point is still the JLS's, and still strict. One
  quirk is worth carrying, because it makes any future -XX: flag on this row suspect:
  OpenJ9 silently ignores options it does not know, where HotSpot refuses to boot on them.
  This entrypoint passes none.
