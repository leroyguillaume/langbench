language: js
# Nothing is compiled ahead of the run. V8 compiles during it, exactly as under
# js-nodejs: same engine, different runtime around it. That is the experiment.
compiler: ~
interpreter: deno
# The kernel. One file, and its size in bytes is a published metric.
source: mandelbrot.mjs
# `native`, and nothing else to offer. The same V8 js-nodejs runs, and the same
# consequence: the machine code is generated *during* the run, on this machine, for
# the instruction set this CPU turned out to have. There is no ISA to pin ahead of
# time, and no flag that would pin one.
modes:
  - native
description: >-
  The same mandelbrot.mjs as js-nodejs, byte for byte, executed by Deno -- which
  runs the same V8. Any gap between these two rows is the runtime around the
  engine: module resolution, the permission checks, and how quickly it can boot a
  worker isolate.
comments: >-
  The build phase is `deno check`, a full type check, where js-nodejs runs `node
  --check`, a parse. DENO_DIR ships warm with the node typings, because a measured run
  has no network to fetch them from.
