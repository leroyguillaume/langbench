language: js
# Nothing is compiled ahead of the run. JavaScriptCore compiles during it, through
# four tiers, and the hot loop ends up as machine code -- but never as a file, and
# never before the run starts.
compiler: ~
interpreter: bun
# The kernel. One file, and its size in bytes is a published metric.
source: mandelbrot.mjs
# One floating-point semantics, and no flag to change it: ECMAScript specifies the
# result of every arithmetic operator, so no engine may contract a multiply-add or
# reassociate. That is why this row's checksum is bit-identical to the V8 rows'.
modes:
  - strict
description: >-
  The same mandelbrot.mjs as js-nodejs and js-deno, byte for byte, executed by Bun
  on JavaScriptCore. Node and Deno share V8; this is the only JavaScript row with
  a different engine underneath, which makes it the only one where a gap is about
  the compiler rather than the runtime around it.
comments: >-
  The build phase is `bun build` — a transpile and a bundle. Node's is a parse and
  Deno's a type check: the three runtimes do not agree on what happens before a run,
  and each build number describes its own runtime's idea of it.
