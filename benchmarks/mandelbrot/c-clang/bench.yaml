# What this backend is. The harness reads this file and nothing else: not the
# directory name, not the image labels. See site/src/content/methodology/declaring-the-work.md.
language: c
compiler: clang
# Nothing executes the binary but the CPU.
interpreter: ~
# The kernel. One file, and its size in bytes is a published metric.
source: mandelbrot.c
# clang distinguishes all three, and spells them exactly as gcc does:
# `-ffp-contract=off`, `-ffp-contract=fast` and `-ffast-math`.
modes: all
description: >-
  The same mandelbrot.c as c-gcc, byte for byte, compiled by clang at -O3 against
  the same ISA baseline, on the same Debian, with the same flags. One source, two
  code generators: whatever separates these two rows is LLVM against GCC.
comments: >-
  Debian's clang, on the same base image, against the same libc and the same linker as
  c-gcc: the distribution and the standard library are held constant so that the code
  generator is the only thing that differs. Like gcc it links libc dynamically, so the
  binary it ships does not contain the C library.
