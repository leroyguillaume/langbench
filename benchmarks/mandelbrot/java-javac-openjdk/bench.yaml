algo: mandelbrot
language: java
# Both, and the pair is the whole story of the JVM: javac compiles the source to
# bytecode ahead of the run, and HotSpot executes that bytecode -- interpreting it
# first, then JIT-compiling the hot loop to machine code while it runs. Neither
# field alone describes this backend, which is exactly why there is no single
# "compiler" column in this table.
compiler: javac
interpreter: openjdk
# One floating-point semantics. Since JEP 306 (Java 17) every expression is
# evaluated strictly, and the JLS forbids javac *and* the JIT from contracting a
# multiply-add: fusing is `Math.fma`, which the source has to write. `fma` and
# `fast` would be this same run under another tag.
modes:
  - strict
description: >-
  The reference kernel in Java, compiled by javac and run on HotSpot with platform
  threads and an AtomicInteger work queue. No Maven, no Gradle, no jar: one file,
  one javac invocation, so the Build column times the compiler and nothing else.
comments: >-
  HotSpot has no -march: C2 compiles for whatever CPU it finds, which is the
  `native` targeting this project forbids everywhere else. The closest the JVM
  offers is a cap on vector width (-XX:UseAVX / -XX:UseSVE) and that is what the
  entrypoint pins -- an approximation, published as one. The JVM's startup is the
  largest in the table, and it is a result, not overhead to subtract.
