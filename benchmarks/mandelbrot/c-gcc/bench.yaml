# What this backend is. The harness reads this file and nothing else: not the
# directory name, not the image labels. See CLAUDE.md#declaring-the-work.
language: c
compiler: gcc
# Nothing executes the binary but the CPU.
interpreter: ~
# The kernel. One file, and its size in bytes is a published metric.
source: mandelbrot.c
# gcc compiles ahead of the run, so it has to be told which machine to emit code
# for, and it emits a different one for each answer: a baseline every CPU of the
# architecture can run, or the exact CPU it happens to be compiling on. Both are
# real builds of the same source, so both are built.
modes: all
description: >-
  The reference kernel. Hand-written C, compiled by gcc at -O3 against the ISA the
  mode names, with std threads and an atomic work queue. Every other row in this
  table is read against this one.
comments: >-
  gcc links libc dynamically: the binary this row ships does not contain the C
  library. The code is in libc.so, outside the file the harness measures.
