language: kotlin
compiler: kotlinc
interpreter: graalvm
# The kernel. One file, and its size in bytes is a published metric.
source: Mandelbrot.kt
modes:
  - strict
description: >-
  The same Mandelbrot.kt as kotlin-kotlinc-openjdk, byte for byte, compiled by the
  same kotlinc -- with Graal replacing C2 as the JIT. One cell of the (language x
  JVM) grid.
comments: >-
  One cell of the (language × JVM) grid. The entrypoint passes -XX:+UseJVMCICompiler
  explicitly rather than trusting a default: a silent fall back to C2 would make this
  row kotlin-kotlinc-openjdk under another name.
