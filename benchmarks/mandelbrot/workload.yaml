# What the work is. Every backend under `implementations` computes exactly this,
# and in every mode every one of them produces exactly `checksum`, to the bit.
id: mandelbrot
description: >-
  Escape-time Mandelbrot over a square grid: for every pixel, iterate z = z^2 + c
  until |z| > 2 or the iteration ceiling is reached, and sum the iteration counts.
  The work is imbalanced by construction -- the pixels inside the set cost the full
  ceiling, the ones outside bail out early -- so rows are handed out dynamically off
  an atomic cursor rather than split evenly ahead of time.


  What it puts under the light. A tight scalar floating-point loop with no
  allocation, no branching to speak of and a working set that fits in registers: what
  it measures is the quality of the machine code a backend produces for double
  arithmetic, and how fast it can be produced at all. Because every backend computes
  the same answer to the bit -- in every mode -- the checksum is a correctness
  gate rather than a formality -- a compiler that reassociates or fuses a
  multiply-add to go faster is caught by it, not rewarded. Around the loop, the same
  run also prices the things a runtime charges whatever the work is: the gap between
  the program's own clock and the container's, which is startup; the cost of
  compiling one file, which is the build phase; the memory a runtime needs before it
  can add two doubles; and whether the backend can keep every core it was handed busy
  on a load that refuses to divide evenly.


  What it says nothing about. There is no allocation in the hot loop, so it tells you
  nothing about a garbage collector under pressure -- the JVM rows here are running
  the one workload a GC never has to work for. There is no pointer chasing, no
  dynamic dispatch, no cache pressure, no I/O, no syscalls, no strings and no
  parsing. It exercises a fork-join over one flat grid, not a concurrency model. It
  is a batch program that starts, computes and exits, so it says nothing about a
  server that has been warm for six hours, nor about a JIT that has had time to
  reach a steady state. A backend that wins this workload has told you it can add
  doubles quickly and start quickly; it has told you nothing whatever about what it
  would do with a JSON parser, a hash map, or an HTTP handler.
# How the work is sized. The order is the order the kernels receive them:
#   run <grid_size> <max_iter> <threads>
# The thread count is not here: it is a property of the machine, resolved by the
# harness and passed explicitly, never guessed by a kernel.
params:
  - name: grid_size
    value: 2048
  - name: max_iter
    value: 1000
# The answer, for the params above and for them alone. A 64-bit integer, and the
# correctness gate of the whole project: in every mode, every compiler, every
# language and every architecture produces this, bit for bit. A backend that
# disagrees is not slow, it is wrong, and it is quarantined out of the campaign.
checksum: 1038538536
# The backends that implement this workload. Declared, never walked for: a
# directory is measured because this list says so, not because of where it sits.
implementations:
  - c-clang
  - c-gcc
  - cpp-clang
  - cpp-gcc
  - go-gc
  - java-javac-graalvm
  - java-javac-openj9
  - java-javac-openjdk
  - java-native-image
  - js-bun
  - js-deno
  - js-nodejs
  - julia
  - kotlin-kotlinc-graalvm
  - kotlin-kotlinc-openj9
  - kotlin-kotlinc-openjdk
  - kotlin-native-image
  - python-cpython
  - python-cython
  - python-pypy
  - rust-rustc
  - scala-native-image
  - scala-scala-native
  - scala-scalac-graalvm
  - scala-scalac-openj9
  - scala-scalac-openjdk
  - ts-bun
  - ts-deno
  - ts-nodejs
  - zig
