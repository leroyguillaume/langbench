language: python
# Nothing is compiled ahead of the run. PyPy's tracing JIT emits machine code --
# that is the entire reason the row exists -- but it does so *during* the run, once
# the loop is hot, and the result never lands in a file. A JIT is not a compiler in
# this table's sense: nothing is compiled before the program starts.
compiler: ~
interpreter: pypy
# The kernel. One file, and its size in bytes is a published metric.
source: mandelbrot.py
# `native`, and nothing else to offer. PyPy's tracing JIT records the hot loop and
# assembles it into machine code for the CPU it is running on -- this one, the only
# one it will ever see -- so the code that does the arithmetic got this machine's
# instruction set without anyone asking for it, and there is no flag that would
# hold it back to a pinned baseline. That is exactly what separates this row from
# python-cpython, which has no JIT at all: what runs there is a Debian-compiled
# interpreter, built for a fixed ISA long before this campaign started.
modes:
  - native
description: >-
  The same mandelbrot.py as python-cpython, byte for byte, executed by PyPy. The
  source is unchanged, the multiprocessing pool is unchanged; the difference is a
  tracing JIT that turns the hot loop into machine code while it runs.
comments: >-
  The JIT compiles the hot loop inside the measured run, because that is where it
  happens: there is no warm-up phase to hide it in, and hiding it would be a different
  benchmark. The source and the multiprocessing pool are python-cpython's, unchanged.
