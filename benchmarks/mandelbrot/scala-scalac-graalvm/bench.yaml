language: scala
compiler: scalac
interpreter: graalvm
# The kernel. One file, and its size in bytes is a published metric.
source: Mandelbrot.scala
modes:
  - strict
description: >-
  The same Mandelbrot.scala as scala-scalac-openjdk, byte for byte, compiled by the
  same scalac -- with Graal replacing C2 as the JIT. One cell of the (language x
  JVM) grid.
comments: >-
  One cell of the (language × JVM) grid. The entrypoint passes -XX:+UseJVMCICompiler
  explicitly rather than trusting a default: a silent fall back to C2 would make this
  row scala-scalac-openjdk under another name.
