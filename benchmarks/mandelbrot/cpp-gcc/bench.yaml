language: cpp
compiler: gcc
# Nothing executes the binary but the CPU.
interpreter: ~
# The kernel. One file, and its size in bytes is a published metric.
source: mandelbrot.cpp
# Same compiler as c-gcc, same three code generators over the same source.
modes: all
description: >-
  The C kernel written the way a C++ programmer would write it -- std::thread,
  std::atomic, std::vector, a lambda for the worker -- and compiled by the same
  GCC at -O3 on the same base image. The arithmetic is identical; the abstractions
  are not.
comments: >-
  `cpp` and not `c++`: the identity becomes an image tag, and a Docker tag admits no
  `+`.
