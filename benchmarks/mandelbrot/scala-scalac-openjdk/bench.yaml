workload: mandelbrot
language: scala
# Both, as for every JVM row: scalac compiles the source to bytecode ahead of the
# run, and HotSpot executes it -- interpreting first, then JIT-compiling the hot
# loop while it runs.
compiler: scalac
interpreter: openjdk
# The kernel. One file, and its size in bytes is a published metric.
source: Mandelbrot.scala
# One floating-point semantics, inherited from the JVM: a Double is an IEEE 754
# double, and neither scalac nor the JIT may contract a multiply-add.
modes:
  - strict
description: >-
  The kernel in Scala 3, compiled by scalac to JVM bytecode and run on the same
  HotSpot as java-javac-openjdk and kotlin-kotlinc-openjdk. A plain while loop,
  deliberately: the algorithm is the contract, and a foldLeft over a lazy Iterator
  would measure the collections library instead of the backend.
comments: >-
  Three languages, one JIT: read the Run column against the java and kotlin rows
  and expect them to land close together, because all three hand C2 the same loop.
  Where Scala pays is the Build column -- scalac takes several times javac's time
  on this one file -- and the Startup column, which carries both the Scala 3
  library and the 2.13 one it still stands on.
