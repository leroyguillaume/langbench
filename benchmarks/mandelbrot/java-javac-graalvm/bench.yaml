algo: mandelbrot
language: java
# The same javac as java-javac-openjdk -- identical bytecode, from an identical
# source. The compiler column is not where these two rows differ.
compiler: javac
# This is. GraalVM plugs the Graal compiler into HotSpot through JVMCI, in place of
# C2, so the machine code the hot loop ends up as is generated by a different
# compiler entirely -- during the run, as every JIT does.
interpreter: graalvm
# The kernel. One file, and its size in bytes is a published metric.
source: Mandelbrot.java
# One floating-point semantics: the JLS binds the JIT as tightly as it binds javac,
# so Graal may no more contract a multiply-add than C2 may. Its checksum is
# HotSpot's checksum, which is C's.
modes:
  - strict
description: >-
  The same Mandelbrot.java as java-javac-openjdk, byte for byte, compiled by the
  same javac and run on the same HotSpot -- with Graal replacing C2 as the JIT.
  Same bytecode, same VM, same GC: the code generator is the only variable.
comments: >-
  The cleanest A/B on a JIT this table can construct, and the reason the entrypoint
  passes -XX:+UseJVMCICompiler explicitly rather than trusting a default: a silent
  fall back to C2 would make this row java-javac-openjdk under another name, and
  publish noise as a finding. Do not expect Graal to beat C2 here by default -- on a
  tight numeric loop the two land close together, and this row is worth having for
  the comparison rather than for a winner. Like every HotSpot row, it has no true -march; the
  entrypoint caps vector width instead.
