version: 2

# The workflows pin every action by SHA, and a SHA does not tell you it has gone
# stale. This is what bumps them -- and the tag comment beside them.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    groups:
      # Vite, its plugins and Vitest are one peer-dependency graph: Vitest builds
      # on Vite, and `@vitejs/plugin-react` 6 requires `vite` 8. Bumped one
      # package per pull request, a major lands on a peer conflict and `npm ci`
      # refuses to install -- and no merge order rescues it, because the PR that
      # would satisfy the peer is a different PR. They move together or not at
      # all.
      vite:
        patterns:
          - vite
          - "@vitejs/*"
          - vitest
          - "@vitest/*"
