name: quality

# Formatting, lints and the generated artefacts -- everything `pre-commit` checks.
# The suites live next door, in `test`, and the compilers in `build`: three
# workflows, three runners, one gate. Never path-filtered: it runs on everything,
# whatever changed.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The `language: system` hooks shell out to real binaries -- `cargo`,
      # `npm`, `wasm-pack`. Every one of them has to be here before `pre-commit`
      # runs, or the hook that needs it fails on a missing command rather than on
      # the code it was meant to check.
      - name: set up the Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: cache the compiled dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: set up wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.1

      - name: set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: install the site's dependencies
        run: npm ci
        working-directory: site

      - name: set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: install pre-commit
        run: pip install pre-commit

      # Every hook, on every file. No suite among them: `cargo test` and `vitest`
      # are the `test` workflow's, and they are a slow hook to pay on every commit
      # for a check a runner makes in parallel anyway.
      - name: run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
