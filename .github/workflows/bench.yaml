name: bench

# Runs a campaign per architecture, commits what each recorded, and publishes them.
#
# Two architectures, two runners, **never QEMU**: emulation measures the emulator.
# Each campaign stays whole and separate -- `samples/<workload>/x86_64.ndjson` and
# `samples/<workload>/aarch64.ndjson`, side by side, never merged. An absolute timing does
# not cross an architecture, and the site enforces that by showing one campaign at a
# time.
# See `METHODOLOGY.md#the-architecture-rule`.
#
# A GitHub runner is shared, virtualised and frequency-scaled -- which is to say
# the worst benchmark target money can rent. The numbers this workflow produces
# are *indicative*, and they say so themselves: `langbench` records the host in
# the campaign header, and both the report and the website lead with every reason
# it was a poor target. For a number worth publishing, run a campaign on a real
# machine and commit its `samples/<workload>/<arch>.ndjson` -- the report and the site are
# pure functions of that file and will render it unchanged.
#
# `workflow_dispatch` only. A campaign is a deliberate act, not a side effect of a
# push: it costs minutes of runner time, it rewrites the files this repository
# publishes, and the moment it fires on every commit those files churn for reasons
# that have nothing to do with the backends being measured.
on:
  workflow_dispatch:
    inputs:
      workload:
        description: the workload to measure, by the id its workload.yaml declares
        type: string
        default: mandelbrot
      params:
        description: >-
          override the workload's params, space-separated (e.g. `grid_size=256
          max_iter=100`). Leave empty to measure the work as the workload declares
          it -- which is the only way the declared reference checksum applies.
        type: string
        default: ""
      rounds:
        description: measured rounds of the run phase
        type: string
        default: "10"

permissions:
  contents: read

# Never cancel a campaign in flight, and never publish two at once: a half-written
# report is worse than a stale one.
concurrency:
  group: bench
  cancel-in-progress: false

jobs:
  bench:
    strategy:
      # One architecture failing does not invalidate the other: they are two
      # experiments,
      # and the one that finished is still a result.
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: set up the Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: cache the compiled dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: build the harness
        run: cargo build --release

      # `docker build` prepares, `docker run` measures. The campaign writes its
      # samples file and nothing else. One machine, one workload: the path is a
      # convenience for a human reading `ls`, and neither half of it is what the site
      # keys on -- the workload and the architecture are both read out of the header
      # the run recorded.
      - name: run the campaign
        env:
          WORKLOAD: ${{ inputs.workload }}
          PARAMS: ${{ inputs.params }}
          ROUNDS: ${{ inputs.rounds }}
        run: |
          overrides=()
          for override in ${PARAMS}; do
            overrides+=(--param "${override}")
          done
          ./target/release/langbench workload run "${WORKLOAD}" \
            --output "samples/${WORKLOAD}/${{ matrix.arch }}.ndjson" \
            "${overrides[@]}"

      # Rendering is not part of measuring: a separate command, a pure function of
      # the file above.
      - name: render the report
        env:
          WORKLOAD: ${{ inputs.workload }}
        run: |
          ./target/release/langbench report md \
            "samples/${WORKLOAD}/${{ matrix.arch }}.ndjson" \
            --output "reports/${WORKLOAD}/${{ matrix.arch }}.md"

      - name: upload the campaign
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: campaign-${{ inputs.workload }}-${{ matrix.arch }}
          path: |
            samples/${{ inputs.workload }}/${{ matrix.arch }}.ndjson
            reports/${{ inputs.workload }}/${{ matrix.arch }}.md
          if-no-files-found: error

  # One job, one push. Two matrix jobs committing to `main` would race, and the
  # loser would have to rebase a file it holds the only copy of.
  commit:
    needs: bench
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      # What the site is then rendered from -- the commit that carries the
      # campaigns this run recorded, and not a branch name that may have moved on.
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: download every campaign
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: campaign-*
          merge-multiple: true

      - name: set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: install pre-commit
        run: pip install pre-commit

      # `git commit` in a runner runs no hook: `pre-commit` installs one into a
      # clone, and this clone never had it. Which makes the bot's the one commit in
      # this repository that walks straight past the gate -- `quality` then says so
      # afterwards, on `main`, about a file nobody wrote by hand.
      #
      # The hooks run here to *verify*, never to fix. A hook that wants to rewrite a
      # campaign is a bug in whatever rendered it, and committing the rewritten file
      # would publish samples that are not the ones that were measured: the artefact
      # above and the commit below would disagree about what happened. So a hook that
      # fails takes the push with it -- and the campaign survives as an artefact
      # regardless, which is the whole point of uploading it before committing it.
      #
      # Only the hooks that match these paths run. No Rust, no Node: nothing that
      # reads a `.ndjson` or a rendered `.md` needs a compiler.
      - name: check the campaigns against the hooks
        run: |
          pre-commit run --show-diff-on-failure \
            --files samples/*/*.ndjson reports/*/*.md

      # The samples with the report, never one without the other. A campaign's
      # samples are the only artefact that cannot be recomputed -- the report and
      # the website are both derived from them, and committing a conclusion
      # without its evidence publishes something nobody can check.
      #
      # A campaign that reproduced the committed one, byte for byte, has nothing to
      # commit and is not a failure: HEAD already holds those samples, so it is HEAD
      # the site renders.
      - name: commit the samples and the reports
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add samples reports
          if git diff --cached --quiet; then
            echo 'the campaigns reproduced the committed ones, byte for byte; nothing to commit'
          else
            git commit -m 'bench: campaigns of ${{ github.sha }}'
            git push origin HEAD:main
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Publishing is a rendering, not a measurement: it lives in its own workflow and
  # is a pure function of the samples the job above committed. `bench` calls it
  # here so a campaign still ends with a published page -- but the page can also be
  # rebuilt on its own, without re-measuring a thing.
  pages:
    needs: commit
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yaml
    with:
      ref: ${{ needs.commit.outputs.sha }}
