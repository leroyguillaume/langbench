name: test

# The test suite, on its own runner.
#
# Two jobs, because they are two suites and neither waits on the other. `cargo
# test` covers discovery, the manifests, the statistics and the command lines the
# harness builds; `vitest` covers the TypeScript around the WebAssembly boundary,
# running the *real* module over a *real* campaign -- `site/src/__fixtures__/`,
# raw samples byte for byte. Nothing here measures anything: a shared, virtualised,
# frequency-scaled runner is the worst benchmark target money can rent, and the
# campaign that fixture came from is evidence, not a measurement being taken now.
#
# The filter below is the union of what the two suites *read*, and every entry is
# there because a test would go quiet without it -- not because the file looked
# related. `benchmarks/**` is the one nobody expects: `tests/shared_kernel_source`
# asserts that two backends of one language compile a byte-identical kernel, so it
# reads the kernels themselves. `templates/**` is embedded by `include_str!`. And
# the site's suite runs the crate compiled to WebAssembly, so `src/**` is its input
# as much as `site/**` is.
#
# The list is written twice because GitHub Actions does not support YAML anchors.
on:
  push:
    branches:
      - main
    paths:
      - .cargo/**
      - .github/workflows/test.yaml
      - benchmarks/**
      - build.rs
      - Cargo.lock
      - Cargo.toml
      - site/**
      - src/**
      - templates/**
      - tests/**
  pull_request:
    paths:
      - .cargo/**
      - .github/workflows/test.yaml
      - benchmarks/**
      - build.rs
      - Cargo.lock
      - Cargo.toml
      - site/**
      - src/**
      - templates/**
      - tests/**

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: set up the Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: cache the compiled dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # The kernels themselves are not unit-tested -- they are verified by the
      # strict-mode checksum invariant, which only a campaign can check.
      - name: run the test suite
        run: cargo test --locked --all-targets

  site:
    runs-on: ubuntu-24.04
    steps:
      - name: check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # `npm test` compiles the crate to WebAssembly first, so the toolchain and
      # `wasm-pack` have to be here: `site/src/wasm/` is a build artefact, never
      # committed, and absent from every fresh clone. A test run that skipped the
      # build would check this branch's TypeScript against a module that is not
      # there.
      - name: set up the Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: cache the compiled dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: set up wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.1

      - name: set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: install the site's dependencies
        run: npm ci
        working-directory: site

      # It needs no published campaign: the boundary test owns its own. What the
      # repository publishes and what the tests run over are two different
      # questions.
      - name: run the site's test suite
        run: npm test
        working-directory: site
