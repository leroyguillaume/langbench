---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # A committed lockfile is legitimately large and must stay versioned. So is
        # a campaign: `samples/<arch>.ndjson` is one line per run, and its size is a
        # function of the matrix -- rounds, modes, backends. Today's sits at 498 kB
        # against this hook's 500 kB default, so `--rounds 30` would trip a guard
        # that exists to catch a stray binary, on the one file in this repository
        # that cannot be recomputed and must be committed.
        exclude: ^(site/package-lock\.json|samples/.*\.ndjson)$
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # No `pyproject.toml`: the benchmark kernels are dependency-free single files,
  # not a Python package. Ruff's defaults are the whole configuration.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types:
          - rust
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types:
          - rust
        pass_filenames: false

      # No `cargo test` and no `vitest` here. The suites are the `test` workflow's:
      # they are the slowest thing either language has to offer, they run on every
      # commit of a hook that is meant to be instant, and a runner is already
      # running them in parallel with everything else. A hook checks what is cheap
      # to check and expensive to get wrong -- formatting, lints, generated files.

      # The schemas are generated, never edited. These hooks rewrite them in place,
      # so pre-commit fails the commit exactly when a checked-in copy had drifted
      # from the struct the harness parses -- and leaves the corrected file in the
      # working tree, ready to stage.
      #
      # Two manifests, two schemas: a workload declares the work, an implementation
      # declares a backend that does it.
      - id: bench-schema
        name: bench.schema.json is up to date
        entry: cargo run --quiet -- implementation jsonschema
        language: system
        files: ^(src/discovery\.rs|src/cli\.rs|src/mode\.rs|bench\.schema\.json)$
        pass_filenames: false

      - id: workload-schema
        name: workload.schema.json is up to date
        entry: cargo run --quiet -- workload jsonschema
        language: system
        files: ^(src/workload\.rs|workload\.schema\.json)$
        pass_filenames: false

      # Every failure a campaign would hit at discovery time, without building
      # anything -- an hour of measurement is a long way to travel to find out a
      # key was misspelled.
      #
      # `pass_filenames: false` on purpose: the hook only *runs* when a manifest
      # moved (`files:` below), but it then checks the whole tree. Handing it the
      # changed files alone would blind two rules at once: the duplicate-identity
      # one, which needs both halves of a collision, and the undeclared-manifest
      # one, which needs the tree *and* every workload's list of what it claims.
      - id: bench-validate
        name: validate the workload and implementation manifests
        entry: cargo run --quiet -- validate
        language: system
        files: (^|/)(bench|workload)\.yaml$
        pass_filenames: false

      # Biome -- formatter and linter, in place of ESLint and Prettier. Run from
      # `site/`, where its config is, rather than through the upstream hook: that
      # one runs from the repo root and reads a nested `biome.json` twice.
      - id: site-biome
        name: biome check
        entry: npm --prefix site run check
        language: system
        files: ^site/
        pass_filenames: false

      # The site's other gate. `tsc` is not a formality here: the zod schema in
      # `site/src/analysis.ts` is what the WebAssembly's output is validated
      # against, so a field renamed in `src/analysis.rs` is caught here -- long
      # before a reader sees an empty chart.
      #
      # It builds the WASM first, and that is not belt-and-braces: `site/src/wasm/`
      # is a `wasm-pack` artefact, gitignored, and absent from every fresh clone. A
      # `tsc` that does not build it type-checks against a module that is not there
      # -- which is an error on a runner and, on a machine that happened to run
      # `npm test` last week, silently against a stale one.
      - id: site-typecheck
        name: tsc --noEmit
        entry: npm --prefix site run typecheck
        language: system
        files: ^site/(src/|.*\.json$|.*\.ts$)
        pass_filenames: false
