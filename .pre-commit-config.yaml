---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # A committed lockfile is legitimately large and must stay versioned.
        exclude: ^site/package-lock\.json$
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # No `pyproject.toml`: the benchmark kernels are dependency-free single files,
  # not a Python package. Ruff's defaults are the whole configuration.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types:
          - rust
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types:
          - rust
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test
        language: system
        types:
          - rust
        pass_filenames: false

      # The schema is generated, never edited. This hook rewrites it in place, so
      # pre-commit fails the commit exactly when the checked-in copy had drifted
      # from the struct the harness parses -- and leaves the corrected file in the
      # working tree, ready to stage.
      - id: bench-schema
        name: bench.schema.json is up to date
        entry: cargo run --quiet -- jsonschema
        language: system
        files: ^(src/discovery\.rs|src/cli\.rs|bench\.schema\.json)$
        pass_filenames: false

      # Every failure a campaign would hit at discovery time, without building
      # anything -- an hour of measurement is a long way to travel to find out a
      # key was misspelled.
      #
      # `pass_filenames: false` on purpose: the hook only *runs* when a manifest
      # moved (`files:` below), but it then checks the whole tree. Handing it the
      # changed files alone would blind the duplicate-identity rule, which needs
      # to see both halves of a collision -- and the second half never changed.
      - id: bench-validate
        name: validate bench.yaml manifests
        entry: cargo run --quiet -- validate
        language: system
        files: (^|/)bench\.yaml$
        pass_filenames: false

      # Biome -- formatter and linter, in place of ESLint and Prettier. Run from
      # `site/`, where its config is, rather than through the upstream hook: that
      # one runs from the repo root and reads a nested `biome.json` twice.
      - id: site-biome
        name: biome check
        entry: npm --prefix site run check
        language: system
        files: ^site/
        pass_filenames: false

      # The site's other gates. `tsc` is not a formality here: the zod schema in
      # `site/src/analysis.ts` is what the WebAssembly's output is validated
      # against, and a field renamed in `src/analysis.rs` is caught by the site's
      # tests -- which run the real module over the real campaign -- long before a
      # reader sees an empty chart.
      - id: site-typecheck
        name: tsc --noEmit
        entry: npm --prefix site run typecheck
        language: system
        files: ^site/(src/|.*\.json$|.*\.ts$)
        pass_filenames: false

      - id: site-test
        name: vitest
        entry: npm --prefix site test
        language: system
        files: ^(site/src/|src/)
        pass_filenames: false
