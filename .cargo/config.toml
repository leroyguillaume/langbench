# Development only: keep `cargo run` from writing over a real campaign or a real
# report. `SAMPLES_OUTPUT` is the samples file itself — `run` writes it, `csv`
# and `md` read it — and each rendering has its own destination.
[env]
SAMPLES_OUTPUT = "samples.local/samples.ndjson"
CSV_OUTPUT = "samples.local.csv"
MD_OUTPUT = "report.local.md"
